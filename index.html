<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小于工具箱 | 开源、免费、无广告的在线工具箱</title>
    <meta
      name="description"
      content="一个集合了众多实用工具的在线工具箱，开源、免费、无广告。提供 Base64、JSON 转换、二维码生成、EXIF 查看、视频解析、反应力测试等多种常用在线工具，极简设计，即开即用。"
    />
    <meta
      name="keywords"
      content="在线工具,实用工具,工具,在线工具箱,小于工具箱,效率工具,tools,toolbox,开发者工具,图像工具,视频解析"
    />
    <meta name="author" content="Yule" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="180x180" href="/favicon-180x180.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <script>
      ;(function () {
        const theme = localStorage.getItem('vueuse-color-scheme') || 'auto'
        const isDark =
          theme === 'dark' ||
          (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (isDark) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
