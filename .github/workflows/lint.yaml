name: Code Lint & Build Test

env:
  NO_COLOR: 1

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint_and_build:
    name: Run ESLint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        id: lint_run
        continue-on-error: true
        run: |
          echo "### Lint Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm run lint --no-color | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check Status
        if: steps.lint_run.outcome == 'failure'
        run: exit 1

      - name: Run Type Check
        id: type_check_run
        continue-on-error: true
        run: |
          echo "### Type Check Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm run type-check | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check Status
        if: steps.type_check_run.outcome == 'failure'
        run: exit 1

      - name: Run Build
        id: build_run
        continue-on-error: true
        run: |
          echo "### Dist File List" >> $GITHUB_STEP_SUMMARY
          pnpm run build
          echo "$(find dist -type f | wc -l) Files:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx -y tree-node-cli dist --sizes --all-files --dirs-first --trailing-slash | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check Status
        if: steps.build_run.outcome == 'failure'
        run: exit 1
